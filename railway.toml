# Railway deployment config for the h2s Telegram bot.
# The bot is a single long-running worker process (no HTTP server).
# Single replica only — Telegram long-polling returns 409 Conflict if two
# processes share the same token. Do NOT scale beyond numReplicas = 1.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python -u bot.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
