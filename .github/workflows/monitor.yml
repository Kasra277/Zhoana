name: Holland2Stay Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum cadence)
  workflow_dispatch:         # also lets you run manually from the Actions tab

permissions:
  contents: write            # allow the job to commit state.json back

concurrency:
  group: h2s-monitor
  cancel-in-progress: false  # don't cancel in-flight notifications

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python bot.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "h2s-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi
